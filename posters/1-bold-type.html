<!DOCTYPE html>
<html lang="zh-HK">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1080,height=1080"><title>Poster 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Noto Sans HK',sans-serif}
.grad{background:linear-gradient(135deg,#ff6b6b 0%,#ee5a24 40%,#f97316 70%,#fbbf24 100%)}
.poster{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px 100px}
.emoji{font-size:120px;margin-bottom:30px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.15))}
.tagline{font-size:28px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:4px;text-transform:uppercase;margin-bottom:20px}
.headline{font-size:96px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:30px;text-shadow:0 4px 24px rgba(0,0,0,0.1)}
.sub{font-size:36px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:50px;line-height:1.4}
.url{font-size:28px;font-weight:800;color:#fff;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);padding:16px 40px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.3)}
.features{position:absolute;bottom:60px;display:flex;gap:40px;font-size:22px;color:rgba(255,255,255,0.7);font-weight:600}
.features span{background:rgba(255,255,255,0.15);padding:8px 24px;border-radius:50px;backdrop-filter:blur(4px)}
</style>
</head>
<body class="grad">
<div class="poster">
  <div class="emoji">📚</div>
  <div class="tagline">香港學生專屬</div>
  <h1 class="headline">二手書<br>輕鬆買賣</h1>
  <p class="sub">原價對比 · 新舊評分 · 地鐵面交</p>
  <div class="url">frontend-nine-ochre-13.vercel.app</div>
  <div class="features"><span>搜書</span><span>定價</span><span>發布</span></div>
</div>
</body>
</html>
