<!DOCTYPE html>
<html lang="zh-HK">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1080,height=1080"><title>Poster 3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Noto Sans HK',sans-serif;background:#1a1a2e;color:#fff}
.poster{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px}
.problem{font-size:32px;font-weight:600;color:#a0a0b0;margin-bottom:10px;letter-spacing:2px}
.question{font-size:56px;font-weight:900;line-height:1.3;margin-bottom:40px}
.xmark{color:#ff6b6b;font-size:72px;font-weight:900}
.answer{font-size:28px;color:#4ecdc4;font-weight:600;margin-bottom:30px;letter-spacing:1px}
.platform{font-size:64px;font-weight:900;background:linear-gradient(135deg,#ff6b6b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.features{display:flex;gap:30px;margin-top:40px;flex-wrap:wrap;justify-content:center}
.feat{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:16px 28px;font-size:20px;font-weight:600;color:#ccc}
.url{position:absolute;bottom:50px;font-size:22px;color:#666;font-weight:500}
</style>
</head>
<body>
<div class="poster">
  <div class="problem">開 學 必 經 之 痛</div>
  <div class="question">Carousell搵書2個鐘<br>俾人放飛機<span class="xmark"> ✕</span></div>
  <div class="answer">—— 仲有冇更好嘅方法？ ——</div>
  <div class="platform">HKTextbook</div>
  <div class="features">
    <span class="feat">原價對比</span>
    <span class="feat">新舊評分</span>
    <span class="feat">站內私信</span>
    <span class="feat">地鐵面交</span>
  </div>
</div>
<div class="url">frontend-nine-ochre-13.vercel.app</div>
</body>
</html>
