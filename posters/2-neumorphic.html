<!DOCTYPE html>
<html lang="zh-HK">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1080,height=1080"><title>Poster 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Noto Sans HK',sans-serif;background:#f5f0eb}
.poster{width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:60px;padding:80px}
.left{flex:1;text-align:center}
.right{flex:1}
.bigNum{font-size:200px;font-weight:900;color:#ff6b6b;line-height:0.9;letter-spacing:-4px}
.bigLabel{font-size:40px;font-weight:800;color:#333;margin-top:10px}
.cards{display:flex;flex-direction:column;gap:20px}
.card{background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);border:1px solid rgba(0,0,0,0.06);border-radius:24px;padding:30px 35px;box-shadow:0 2px 12px rgba(0,0,0,0.04)}
.card h3{font-size:28px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.card p{font-size:20px;color:#888;font-weight:500}
.cta{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;font-size:24px;font-weight:800;padding:16px 50px;border-radius:100px;box-shadow:0 6px 20px rgba(238,90,36,0.3)}
</style>
</head>
<body>
<div class="poster">
  <div class="left">
    <div class="bigNum">3步</div>
    <div class="bigLabel">賣出舊書</div>
  </div>
  <div class="right">
    <div class="cards">
      <div class="card"><h3>1. 搜書名</h3><p>搵到你本教科書</p></div>
      <div class="card"><h3>2. 定價錢</h3><p>原價對比，自由定價</p></div>
      <div class="card"><h3>3. 等面交</h3><p>站內私信，約地鐵站</p></div>
    </div>
  </div>
</div>
<div class="cta">📚 HKTextbook · 學生二手書平台</div>
</body>
</html>
